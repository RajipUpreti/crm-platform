basePath: /
definitions:
  auth.CurrentUserResponse:
    properties:
      expiresAt:
        type: string
      membership:
        $ref: '#/definitions/membership.Membership'
      tenant:
        $ref: '#/definitions/tenant.Tenant'
      user:
        $ref: '#/definitions/user.User'
    type: object
  auth.LogoutResponse:
    properties:
      loggedOut:
        example: true
        type: boolean
    type: object
  auth.SwaggerErrorResponse:
    properties:
      error:
        $ref: '#/definitions/httpresponse.ErrorDetail'
    type: object
  httpresponse.DependencyHealthResponse:
    properties:
      clientId:
        example: crm-backend
        type: string
      issuer:
        example: http://localhost:8081/realms/crm
        format: uri
        type: string
      redirectUrl:
        example: http://localhost:8080/auth/callback
        format: uri
        type: string
      status:
        example: ok
        type: string
    type: object
  httpresponse.ErrorDetail:
    properties:
      code:
        example: authentication_required
        type: string
      message:
        example: authentication is required
        type: string
    type: object
  httpresponse.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/httpresponse.ErrorDetail'
    type: object
  httpresponse.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  iamhttp.AcceptInvitationRequest:
    properties:
      token:
        type: string
    type: object
  iamhttp.CreateInvitationRequest:
    properties:
      email:
        format: email
        type: string
      role:
        allOf:
        - $ref: '#/definitions/membership.Role'
        enum:
        - ADMIN
        - MEMBER
    type: object
  iamhttp.InvitationListResponse:
    properties:
      invitations:
        items:
          $ref: '#/definitions/invitation.Invitation'
        type: array
    type: object
  iamhttp.MemberListResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/membership.Member'
        type: array
    type: object
  iamhttp.TenantListResponse:
    properties:
      tenants:
        items:
          $ref: '#/definitions/tenant.Access'
        type: array
    type: object
  iamhttp.TenantSwitchResponse:
    properties:
      membership:
        $ref: '#/definitions/membership.Membership'
      tenant:
        $ref: '#/definitions/tenant.Tenant'
    type: object
  iamhttp.UpdateMemberRoleRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/membership.Role'
        enum:
        - ADMIN
        - MEMBER
    type: object
  iamhttp.UpdateMemberStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/membership.Status'
        enum:
        - ACTIVE
        - SUSPENDED
    type: object
  invitation.CreatedInvitation:
    properties:
      invitation:
        $ref: '#/definitions/invitation.Invitation'
      token:
        type: string
    type: object
  invitation.Invitation:
    properties:
      acceptedAt:
        type: string
      createdAt:
        type: string
      email:
        format: email
        type: string
      expiresAt:
        type: string
      id:
        format: uuid
        type: string
      invitedByUserId:
        format: uuid
        type: string
      role:
        allOf:
        - $ref: '#/definitions/membership.Role'
        enum:
        - ADMIN
        - MEMBER
      status:
        allOf:
        - $ref: '#/definitions/invitation.Status'
        enum:
        - PENDING
        - ACCEPTED
        - REVOKED
        - EXPIRED
      tenantId:
        format: uuid
        type: string
      updatedAt:
        type: string
    type: object
  invitation.Status:
    enum:
    - PENDING
    - ACCEPTED
    - REVOKED
    - EXPIRED
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusAccepted
    - StatusRevoked
    - StatusExpired
  membership.DetailedMembership:
    properties:
      id:
        format: uuid
        type: string
      joinedAt:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/membership.Role'
        enum:
        - OWNER
        - ADMIN
        - MEMBER
      status:
        allOf:
        - $ref: '#/definitions/membership.Status'
        enum:
        - ACTIVE
        - INVITED
        - SUSPENDED
        - LEFT
    type: object
  membership.DetailedUser:
    properties:
      displayName:
        type: string
      email:
        format: email
        type: string
      id:
        format: uuid
        type: string
      status:
        allOf:
        - $ref: '#/definitions/user.Status'
        enum:
        - ACTIVE
        - SUSPENDED
        - DELETED
    type: object
  membership.Member:
    properties:
      membership:
        $ref: '#/definitions/membership.DetailedMembership'
      user:
        $ref: '#/definitions/membership.DetailedUser'
    type: object
  membership.Membership:
    properties:
      createdAt:
        type: string
      id:
        format: uuid
        type: string
      joinedAt:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/membership.Role'
        enum:
        - OWNER
        - ADMIN
        - MEMBER
      status:
        allOf:
        - $ref: '#/definitions/membership.Status'
        enum:
        - ACTIVE
        - INVITED
        - SUSPENDED
        - LEFT
      tenantId:
        format: uuid
        type: string
      updatedAt:
        type: string
      userId:
        format: uuid
        type: string
    type: object
  membership.Role:
    enum:
    - OWNER
    - ADMIN
    - MEMBER
    type: string
    x-enum-varnames:
    - RoleOwner
    - RoleAdmin
    - RoleMember
  membership.Status:
    enum:
    - ACTIVE
    - INVITED
    - SUSPENDED
    - LEFT
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusInvited
    - StatusSuspended
    - StatusLeft
  tenant.Access:
    properties:
      current:
        type: boolean
      membership:
        $ref: '#/definitions/membership.Membership'
      tenant:
        $ref: '#/definitions/tenant.Tenant'
    type: object
  tenant.Status:
    enum:
    - ACTIVE
    - SUSPENDED
    - DELETED
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusSuspended
    - StatusDeleted
  tenant.Tenant:
    properties:
      createdAt:
        type: string
      id:
        format: uuid
        type: string
      name:
        example: Acme Corporation
        type: string
      slug:
        example: acme-corporation
        type: string
      status:
        allOf:
        - $ref: '#/definitions/tenant.Status'
        enum:
        - ACTIVE
        - SUSPENDED
        - DELETED
      updatedAt:
        type: string
    type: object
  user.Status:
    enum:
    - ACTIVE
    - SUSPENDED
    - DELETED
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusSuspended
    - StatusDeleted
  user.User:
    properties:
      createdAt:
        example: "2026-07-21T01:00:00Z"
        type: string
      displayName:
        example: Local Developer
        type: string
      email:
        example: developer@example.com
        format: email
        type: string
      emailVerified:
        example: true
        type: boolean
      firstName:
        example: Local
        type: string
      id:
        example: 3ea55be2-3e57-4c85-9d19-f6048c405e44
        format: uuid
        type: string
      lastName:
        example: Developer
        type: string
      status:
        allOf:
        - $ref: '#/definitions/user.Status'
        enum:
        - ACTIVE
        - SUSPENDED
        - DELETED
        example: ACTIVE
      updatedAt:
        example: "2026-07-21T01:00:00Z"
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: upretirajeev0@gmail.com
    name: Rajip Upreti
  description: |-
    Backend API for CRM authentication, users, organisations, contacts, deals, and related resources.
    Authentication uses a Redis-backed opaque session stored in an HttpOnly cookie.
  license:
    name: Proprietary
  termsOfService: https://example.com/terms
  title: CRM Platform API
  version: "1.0"
paths:
  /api/v1/invitations:
    get:
      description: Returns invitations for the current tenant with optional effective-status
        filtering.
      parameters:
      - description: Invitation status
        enum:
        - PENDING
        - ACCEPTED
        - REVOKED
        - EXPIRED
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/iamhttp.InvitationListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: List tenant invitations
      tags:
      - Invitations
  /api/v1/invitations/{invitationId}/resend:
    post:
      description: Generates a new token, invalidates the old link, and extends the
        invitation expiry.
      parameters:
      - description: Invitation ID
        format: uuid
        in: path
        name: invitationId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/invitation.CreatedInvitation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Resend tenant invitation
      tags:
      - Invitations
  /api/v1/invitations/{invitationId}/revoke:
    post:
      description: Revokes a pending invitation belonging to the current tenant.
      parameters:
      - description: Invitation ID
        format: uuid
        in: path
        name: invitationId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/invitation.Invitation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Revoke tenant invitation
      tags:
      - Invitations
  /api/v1/invitations/accept:
    post:
      consumes:
      - application/json
      description: Accepts an invitation when its email matches the authenticated
        CRM user.
      parameters:
      - description: Invitation token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iamhttp.AcceptInvitationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/membership.Membership'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Accept tenant invitation
      tags:
      - Invitations
  /api/v1/members:
    get:
      description: Returns membership and user details for members of the current
        tenant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/iamhttp.MemberListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: List tenant members
      tags:
      - Members
  /api/v1/members/{membershipId}:
    delete:
      description: Marks a membership as LEFT while enforcing tenant, self-removal,
        hierarchy, and ownership rules.
      parameters:
      - description: Membership ID
        format: uuid
        in: path
        name: membershipId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Remove tenant member
      tags:
      - Members
  /api/v1/members/{membershipId}/role:
    patch:
      consumes:
      - application/json
      description: Changes a membership role to ADMIN or MEMBER while enforcing tenant
        and ownership rules.
      parameters:
      - description: Membership ID
        format: uuid
        in: path
        name: membershipId
        required: true
        type: string
      - description: New membership role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iamhttp.UpdateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/membership.Membership'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Change member role
      tags:
      - Members
  /api/v1/members/{membershipId}/status:
    patch:
      consumes:
      - application/json
      description: Suspends or reactivates a membership while enforcing tenant and
        ownership rules.
      parameters:
      - description: Membership ID
        format: uuid
        in: path
        name: membershipId
        required: true
        type: string
      - description: New membership status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iamhttp.UpdateMemberStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/membership.Membership'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Change member status
      tags:
      - Members
  /api/v1/tenant/invitations:
    post:
      consumes:
      - application/json
      description: Invites a user to the current tenant. OWNER or ADMIN membership
        is required.
      parameters:
      - description: Invitation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iamhttp.CreateInvitationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/invitation.CreatedInvitation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Create tenant invitation
      tags:
      - Invitations
  /api/v1/tenants:
    get:
      description: Returns active tenant memberships for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/iamhttp.TenantListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: List available tenants
      tags:
      - Tenants
  /api/v1/tenants/{tenantId}/switch:
    post:
      description: Validates active membership, rotates the application session, and
        selects the requested tenant.
      parameters:
      - description: Tenant ID
        format: uuid
        in: path
        name: tenantId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/iamhttp.TenantSwitchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Switch current tenant
      tags:
      - Tenants
  /auth/callback:
    get:
      description: Validates the Keycloak response, creates a session cookie, and
        redirects to the frontend.
      parameters:
      - description: OIDC authorization code
        in: query
        name: code
        type: string
      - description: One-time OIDC state value
        in: query
        name: state
        type: string
      - description: OIDC provider error code
        in: query
        name: error
        type: string
      - description: OIDC provider error description
        in: query
        name: error_description
        type: string
      produces:
      - application/json
      responses:
        "303":
          description: Session cookie set and browser redirected to the frontend
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
      summary: Complete OIDC login
      tags:
      - Authentication
  /auth/login:
    get:
      description: Creates a one-time OIDC transaction and redirects the browser to
        Keycloak.
      parameters:
      - description: Safe application-relative path after login
        example: /dashboard
        in: query
        name: return_to
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Redirect to the Keycloak authorization endpoint
          schema:
            type: string
        "500":
          description: Could not start authentication
          schema:
            type: string
      summary: Start login
      tags:
      - Authentication
  /auth/logout:
    post:
      description: Deletes the current session when present and always clears the
        session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LogoutResponse'
      summary: Log out
      tags:
      - Authentication
  /auth/me:
    get:
      description: Returns the user associated with the Redis-backed application session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.CurrentUserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Get current user
      tags:
      - Authentication
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpresponse.HealthResponse'
      summary: API health
      tags:
      - Health
  /health/auth:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpresponse.DependencyHealthResponse'
      summary: Authentication health
      tags:
      - Health
schemes:
- http
securityDefinitions:
  CookieAuth:
    in: header
    name: Cookie
    type: apiKey
swagger: "2.0"
